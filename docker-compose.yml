version: "3.8"
services:
  drivertrack-db:
    image: postgres:16-alpine
    container_name: drivertrack-db
    environment:
      POSTGRES_DB: drivertrack
      POSTGRES_USER: drivertrack_user
      POSTGRES_PASSWORD: drivertrack_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drivertrack_user -d drivertrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  drivertrack:
    build: .
    container_name: drivertrack
    ports:
      - "5000:5000"
    depends_on:
      drivertrack-db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://drivertrack_user:drivertrack_pass@drivertrack-db:5432/drivertrack
      - JWT_SECRET=${JWT_SECRET:-Dr1v3rTRACK_Sup3rS3cur3_K3y_2026!}
      - QR_SECRET=${QR_SECRET:-QR_G3n_S3cr3t_K3y_D41ly_R0t4t3!}

volumes:
  pgdata:
